<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Downloader Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 500px; text-align: center; }
        h2 { margin-bottom: 10px; font-size: 28px; letter-spacing: 1px; }
        p { color: #b3b3b3; margin-bottom: 30px; font-size: 14px; }
        input { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: white; font-size: 16px; outline: none; transition: 0.3s; margin-bottom: 20px; }
        input:focus { border-color: #00d2ff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        button { width: 100%; padding: 15px; background: linear-gradient(to right, #00d2ff, #3a7bd5); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
        .status { margin-top: 20px; font-size: 14px; font-weight: bold; display: none; }
        .success { color: #00e676; }
        .error { color: #ff5252; }
        
        /* Naya Widget Container */
        #widgetContainer { margin-top: 15px; display: none; width: 100%; border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Media Downloader</h2>
        <p>100% Secure & Fast Extraction</p>
        
        <input type="text" id="urlInput" placeholder="Paste link here (e.g. latest Sidhu Moosewala track...)">
        
        <button id="downloadBtn" onclick="generateLink()">
            <span id="btnText">Get High-Speed Link</span>
        </button>

        <div id="statusMessage" class="status"></div>
        
        <div id="widgetContainer"></div>
    </div>

    <script>
        function generateLink() {
            const url = document.getElementById('urlInput').value;
            const statusDiv = document.getElementById('statusMessage');
            const widgetContainer = document.getElementById('widgetContainer');
            const btn = document.getElementById('downloadBtn');

            // Basic check ki link valid hai ya nahi
            if(!url || !url.includes('youtu')) { 
                showStatus('Please paste a valid YouTube URL.', 'error'); 
                return; 
            }

            btn.innerText = 'Bypassing Server... Generating Link...';
            btn.disabled = true;

            // Render backend ko bypass karke direct client-side button load karna
            setTimeout(() => {
                const safeUrl = encodeURIComponent(url);
                
                // Hum Loader.to ka secure iframe widget use kar rahe hain
                widgetContainer.innerHTML = `<iframe style="width:100%;height:60px;border:0;overflow:hidden;" scrolling="no" src="https://loader.to/api/button/?url=${safeUrl}&f=1080"></iframe>`;
                
                widgetContainer.style.display = 'block';
                showStatus('Success! Click the new button below to save.', 'success');
                
                btn.style.display = 'none'; 
            }, 1000);
        }

        function showStatus(text, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerText = text; statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
